# Render Blueprint - 星詠みの館
# https://dashboard.render.com → New → Blueprint → このリポジトリを接続

services:
  - type: web
    runtime: python
    name: hoshiyomi-no-yakata
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # ダッシュボードでAPIキーを入力
